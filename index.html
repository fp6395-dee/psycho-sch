<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Пробный Сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0d0e15;
            color: #fff;
            overflow-hidden: min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Эффект 1: Анимированный фон из частиц */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        /* Эффект 2: Печатающийся текст */
        .typing-text {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            border-right: 3px solid #ff007f;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3.5s steps(30, end) forwards, blink 0.75s step-end infinite;
            margin-bottom: 40px;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff007f; }
        }

        /* Эффект 3: Интерактивная 3D-карточка с неоновым свечением */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            max-width: 400px;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .card:hover {
            border-color: #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4), inset 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
            transform: translateZ(30px);
        }

        .card p {
            color: #8a8f98;
            line-height: 1.6;
            transform: translateZ(20px);
        }
    </style>
</head>
<body>

    <!-- Сетка для частиц фона -->
    <div id="particles-js"></div>

    <div class="container">
        <!-- Анимированный заголовок -->
        <div class="typing-text">Привет, мир! Это GitHub Pages.</div>

        <!-- 3D Карточка -->
        <div class="card" id="tilt-card">
            <h2>Киберпанк Эффект</h2>
            <p>Двигай курсором по этой карточке, чтобы увидеть интерактивный 3D-наклон. При наведении срабатывает мягкое неоновое свечение.</p>
        </div>
    </div>

    <!-- Подключаем легкую библиотеку для летящих точек -->
    <script src="https://jsdelivr.net"></script>
    <script>
        /* Настройка фона из частиц */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f0ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ff007f", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true }
            },
            "retina_detect": true
        });

        /* Скрипт для 3D наклона карточки за мышкой */
        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        // Сброс наклона, когда мышка уходит
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
